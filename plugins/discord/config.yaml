bot:
  token: "${DISCORD_BOT_TOKEN}"
  guild_id: null

api:
  base_url: "http://localhost:${FLASK_PORT:-5002}/api"
  timeout: 120
  health_check_interval: 60

security:
  admin_roles: ["Admin", "Bot Admin"]
  allowed_channels: []
  allow_dms: true
  max_prompt_length: 2000
  max_image_prompt_length: 500

rate_limits:
  ask: 10
  imagine: 3
  generate_csv: 2
  search: 15
  enhance_prompt: 10
  claude: 5
  video: 1

voice:
  enabled: true
  silence_threshold_ms: 1500
  max_listen_duration_s: 30
  tts_voice: "ryan"
  interrupt_on_speech: true

image:
  max_queue_depth: 5
  default_steps: 20
  default_size: 512

conversation:
  max_history: 50

vip:
  user_ids: []
  greeting: |
    Hello Dario. We've been expecting you.

    You're inside Guaardvark — a self-hosted AI platform built from the ground up. Your API powers a system we call Uncle Claude: a three-tier architecture where Claude serves as Escalation Engine (handles what local models can't), Code Guardian (reviews autonomous changes for safety), and System Advisor (monitors health and recommends improvements).

    This wasn't built for a demo. This is the real thing, running live. And this part was built for an audience of one.

    Try `/claude` to talk to Uncle Claude directly, or `/guaardvark system status` to see what's under the hood.
