<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guaardvark Vision Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    position: relative;
  }

  #header {
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  #header .score { color: #4caf50; font-weight: bold; }
  #header .misses { color: #f44336; font-weight: bold; }

  #arena {
    position: relative;
    width: 100%;
    height: calc(100% - 40px);
  }

  /* Click targets */
  .target {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    transition: transform 0.1s;
    user-select: none;
  }
  .target:active { transform: scale(0.9); }
  .target.hit {
    background: #4caf50 !important;
    animation: hitPulse 0.3s ease-out;
  }
  .target.miss {
    background: #f44336 !important;
    animation: missPulse 0.3s ease-out;
  }

  /* Buttons */
  .train-btn {
    position: absolute;
    padding: 10px 24px;
    border: 2px solid #333;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    user-select: none;
    transition: background 0.15s;
  }
  .train-btn:hover { filter: brightness(1.1); }
  .train-btn:active { transform: scale(0.95); }
  .train-btn.clicked {
    border-color: #4caf50;
    box-shadow: 0 0 8px #4caf50;
  }

  /* Text input fields */
  .train-input {
    position: absolute;
    padding: 8px 12px;
    border: 2px solid #666;
    border-radius: 4px;
    font-size: 14px;
    background: white;
    width: 200px;
  }
  .train-input:focus {
    border-color: #2196f3;
    outline: none;
  }
  .train-input.filled {
    border-color: #4caf50;
    background: #e8f5e9;
  }

  /* Search bar */
  #search-bar {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
  }
  #search-input {
    width: 400px;
    padding: 10px 16px;
    border: 2px solid #999;
    border-radius: 24px 0 0 24px;
    font-size: 16px;
    outline: none;
  }
  #search-input:focus { border-color: #2196f3; }
  #search-btn {
    padding: 10px 24px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 0 24px 24px 0;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }
  #search-btn:hover { background: #1976d2; }

  /* Dropdown/select */
  .train-select {
    position: absolute;
    padding: 8px 12px;
    border: 2px solid #666;
    border-radius: 4px;
    font-size: 14px;
    background: white;
    cursor: pointer;
  }

  /* Checkbox & radio */
  .train-check-group {
    position: absolute;
    background: white;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ddd;
    font-size: 14px;
  }
  .train-check-group label {
    display: block;
    padding: 4px 0;
    cursor: pointer;
  }
  .train-check-group input {
    margin-right: 8px;
    cursor: pointer;
    width: 16px;
    height: 16px;
  }

  /* Log panel */
  #log-panel {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 300px;
    height: 180px;
    background: #1a1a2e;
    color: #4caf50;
    border-radius: 6px;
    padding: 8px;
    font-family: monospace;
    font-size: 11px;
    overflow-y: auto;
    border: 1px solid #333;
  }
  #log-panel .log-entry { padding: 1px 0; }
  #log-panel .log-hit { color: #4caf50; }
  #log-panel .log-miss { color: #f44336; }
  #log-panel .log-action { color: #2196f3; }

  /* Mode selector */
  #mode-bar {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    padding: 6px 16px;
    background: #ddd;
    border: 1px solid #999;
    border-radius: 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
  }
  .mode-btn.active {
    background: #2196f3;
    color: white;
    border-color: #1976d2;
  }

  @keyframes hitPulse {
    0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.7); }
    100% { box-shadow: 0 0 0 20px rgba(76,175,80,0); }
  }
  @keyframes missPulse {
    0% { box-shadow: 0 0 0 0 rgba(244,67,54,0.7); }
    100% { box-shadow: 0 0 0 20px rgba(244,67,54,0); }
  }
</style>
</head>
<body>

<div id="header">
  <span>Guaardvark Vision Trainer v1.0</span>
  <span>
    Hits: <span class="score" id="hit-count">0</span> |
    Misses: <span class="misses" id="miss-count">0</span> |
    Accuracy: <span id="accuracy">0%</span> |
    Mode: <span id="current-mode">Click Targets</span>
  </span>
</div>

<div id="arena">
  <!-- Mode selector -->
  <div id="mode-bar">
    <div class="mode-btn active" onclick="setMode('targets')" id="mode-targets">Click Targets</div>
    <div class="mode-btn" onclick="setMode('buttons')" id="mode-buttons">Buttons</div>
    <div class="mode-btn" onclick="setMode('forms')" id="mode-forms">Forms</div>
    <div class="mode-btn" onclick="setMode('search')" id="mode-search">Search</div>
    <div class="mode-btn" onclick="setMode('mixed')" id="mode-mixed">Mixed</div>
  </div>

  <!-- TARGETS MODE: Random colored circles to click -->
  <div id="targets-layer" class="layer"></div>

  <!-- BUTTONS MODE: Various buttons to find and click -->
  <div id="buttons-layer" class="layer" style="display:none">
    <div class="train-btn" style="left:100px;top:120px;background:#e3f2fd;color:#1565c0" onclick="btnClick(this,'Submit')">Submit</div>
    <div class="train-btn" style="left:350px;top:180px;background:#fff3e0;color:#e65100" onclick="btnClick(this,'Cancel')">Cancel</div>
    <div class="train-btn" style="left:600px;top:140px;background:#e8f5e9;color:#2e7d32" onclick="btnClick(this,'Save')">Save</div>
    <div class="train-btn" style="left:850px;top:200px;background:#fce4ec;color:#c62828" onclick="btnClick(this,'Delete')">Delete</div>
    <div class="train-btn" style="left:200px;top:320px;background:#f3e5f5;color:#6a1b9a" onclick="btnClick(this,'Next')">Next</div>
    <div class="train-btn" style="left:500px;top:380px;background:#e0f7fa;color:#00695c" onclick="btnClick(this,'Previous')">Previous</div>
    <div class="train-btn" style="left:750px;top:340px;background:#fff9c4;color:#f57f17" onclick="btnClick(this,'Upload')">Upload</div>
    <div class="train-btn" style="left:150px;top:480px;background:#efebe9;color:#4e342e" onclick="btnClick(this,'Download')">Download</div>
    <div class="train-btn" style="left:450px;top:520px;background:#e8eaf6;color:#283593" onclick="btnClick(this,'Refresh')">Refresh</div>
    <div class="train-btn" style="left:700px;top:500px;background:#fbe9e7;color:#bf360c" onclick="btnClick(this,'Settings')">Settings</div>
  </div>

  <!-- FORMS MODE: Input fields, checkboxes, dropdowns -->
  <div id="forms-layer" class="layer" style="display:none">
    <label style="position:absolute;left:80px;top:110px;font-weight:bold;font-size:14px">Name:</label>
    <input class="train-input" id="f-name" style="left:80px;top:130px" placeholder="Enter your name" onfocus="logAction('Focused: Name field')" onchange="inputFilled(this)">

    <label style="position:absolute;left:80px;top:200px;font-weight:bold;font-size:14px">Email:</label>
    <input class="train-input" id="f-email" style="left:80px;top:220px" placeholder="Enter email" type="email" onfocus="logAction('Focused: Email field')" onchange="inputFilled(this)">

    <label style="position:absolute;left:80px;top:290px;font-weight:bold;font-size:14px">Password:</label>
    <input class="train-input" id="f-password" style="left:80px;top:310px" placeholder="Enter password" type="password" onfocus="logAction('Focused: Password field')" onchange="inputFilled(this)">

    <label style="position:absolute;left:400px;top:110px;font-weight:bold;font-size:14px">Country:</label>
    <select class="train-select" style="left:400px;top:130px;width:200px" onchange="logAction('Selected: ' + this.value)">
      <option value="">-- Select --</option>
      <option>United States</option>
      <option>Canada</option>
      <option>United Kingdom</option>
      <option>Germany</option>
      <option>Japan</option>
    </select>

    <div class="train-check-group" style="left:400px;top:200px">
      <strong>Interests:</strong>
      <label><input type="checkbox" onchange="logAction('Checked: AI/ML')"> AI / Machine Learning</label>
      <label><input type="checkbox" onchange="logAction('Checked: Web Dev')"> Web Development</label>
      <label><input type="checkbox" onchange="logAction('Checked: Data Science')"> Data Science</label>
      <label><input type="checkbox" onchange="logAction('Checked: DevOps')"> DevOps</label>
    </div>

    <div class="train-check-group" style="left:400px;top:400px">
      <strong>Experience:</strong>
      <label><input type="radio" name="exp" onchange="logAction('Radio: Beginner')"> Beginner</label>
      <label><input type="radio" name="exp" onchange="logAction('Radio: Intermediate')"> Intermediate</label>
      <label><input type="radio" name="exp" onchange="logAction('Radio: Expert')"> Expert</label>
    </div>

    <div class="train-btn" style="left:80px;top:420px;background:#e8f5e9;color:#2e7d32" onclick="btnClick(this,'Form Submit')">Submit Form</div>
    <div class="train-btn" style="left:250px;top:420px;background:#fff3e0;color:#e65100" onclick="btnClick(this,'Form Reset')">Reset</div>
  </div>

  <!-- SEARCH MODE: Search bar + results to click -->
  <div id="search-layer" class="layer" style="display:none">
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Search for something..." onfocus="logAction('Focused: Search bar')">
      <button id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results" style="position:absolute;top:120px;left:100px;width:600px"></div>
  </div>

  <!-- Log panel (always visible) -->
  <div id="log-panel">
    <div class="log-entry log-action">Vision Trainer ready. Select a mode above.</div>
  </div>
</div>

<script>
  let hits = 0, misses = 0;
  let currentMode = 'targets';
  let targetInterval = null;

  function updateStats() {
    document.getElementById('hit-count').textContent = hits;
    document.getElementById('miss-count').textContent = misses;
    const total = hits + misses;
    document.getElementById('accuracy').textContent = total > 0 ? Math.round(hits / total * 100) + '%' : '0%';
  }

  function log(msg, cls) {
    const panel = document.getElementById('log-panel');
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + (cls || '');
    const ts = new Date().toLocaleTimeString();
    entry.textContent = `[${ts}] ${msg}`;
    panel.appendChild(entry);
    panel.scrollTop = panel.scrollHeight;
    // Keep log manageable
    while (panel.children.length > 50) panel.removeChild(panel.firstChild);
  }

  function logAction(msg) { log(msg, 'log-action'); }

  // ── TARGETS MODE ──
  function spawnTarget() {
    const layer = document.getElementById('targets-layer');
    // Remove old targets (max 5 on screen)
    while (layer.children.length >= 5) layer.removeChild(layer.firstChild);

    const size = 30 + Math.random() * 50; // 30-80px
    const colors = ['#f44336','#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#00bcd4','#009688','#4caf50','#ff9800','#ff5722'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const x = 40 + Math.random() * (1200 - size);
    const y = 80 + Math.random() * (540 - size);

    const target = document.createElement('div');
    target.className = 'target';
    target.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:${color};font-size:${size/3}px`;
    target.textContent = Math.floor(Math.random() * 9) + 1;
    target.dataset.x = Math.round(x + size/2);
    target.dataset.y = Math.round(y + size/2);

    target.addEventListener('click', function(e) {
      hits++;
      this.classList.add('hit');
      log(`HIT target at (${this.dataset.x}, ${this.dataset.y}) size=${Math.round(size)}px`, 'log-hit');
      updateStats();
      setTimeout(() => this.remove(), 300);
    });

    layer.appendChild(target);
  }

  // Miss detection: clicking arena background in target mode
  document.getElementById('arena').addEventListener('click', function(e) {
    if (currentMode !== 'targets') return;
    if (e.target === this || e.target.id === 'targets-layer') {
      misses++;
      log(`MISS at (${e.clientX}, ${e.clientY})`, 'log-miss');
      updateStats();
    }
  });

  // ── BUTTONS MODE ──
  function btnClick(el, name) {
    hits++;
    el.classList.add('clicked');
    log(`CLICKED: "${name}" button at (${el.offsetLeft}, ${el.offsetTop})`, 'log-hit');
    updateStats();
    setTimeout(() => el.classList.remove('clicked'), 500);
  }

  // ── FORMS MODE ──
  function inputFilled(el) {
    if (el.value.trim()) {
      el.classList.add('filled');
      hits++;
      log(`FILLED: ${el.placeholder || el.id} = "${el.value}"`, 'log-hit');
      updateStats();
    }
  }

  // ── SEARCH MODE ──
  function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;
    hits++;
    log(`SEARCH: "${query}"`, 'log-hit');
    updateStats();

    const results = document.getElementById('search-results');
    results.innerHTML = '';
    const items = [
      `Result 1: ${query} — Introduction and Overview`,
      `Result 2: ${query} — Getting Started Guide`,
      `Result 3: ${query} — Advanced Techniques`,
      `Result 4: ${query} — Troubleshooting FAQ`,
      `Result 5: ${query} — Community Discussion`,
    ];
    items.forEach((text, i) => {
      const div = document.createElement('div');
      div.style.cssText = 'padding:12px;margin:8px 0;background:white;border-radius:6px;border:1px solid #ddd;cursor:pointer;font-size:14px';
      div.textContent = text;
      div.addEventListener('click', function() {
        hits++;
        this.style.borderColor = '#4caf50';
        this.style.background = '#e8f5e9';
        log(`CLICKED result: "${text}"`, 'log-hit');
        updateStats();
      });
      results.appendChild(div);
    });
  }

  // ── MODE SWITCHING ──
  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
    document.getElementById('current-mode').textContent = document.getElementById('mode-' + mode).textContent;

    // Hide all layers
    document.querySelectorAll('.layer').forEach(l => l.style.display = 'none');

    // Clear target spawning
    if (targetInterval) { clearInterval(targetInterval); targetInterval = null; }

    if (mode === 'targets') {
      document.getElementById('targets-layer').style.display = 'block';
      document.getElementById('targets-layer').innerHTML = '';
      spawnTarget(); spawnTarget(); spawnTarget();
      targetInterval = setInterval(spawnTarget, 2000);
    } else if (mode === 'buttons') {
      document.getElementById('buttons-layer').style.display = 'block';
    } else if (mode === 'forms') {
      document.getElementById('forms-layer').style.display = 'block';
    } else if (mode === 'search') {
      document.getElementById('search-layer').style.display = 'block';
    } else if (mode === 'mixed') {
      // Show everything
      document.querySelectorAll('.layer').forEach(l => l.style.display = 'block');
      spawnTarget(); spawnTarget();
      targetInterval = setInterval(spawnTarget, 3000);
    }

    log(`Mode changed: ${mode}`, 'log-action');
  }

  // ── INIT ──
  setMode('targets');
</script>
</body>
</html>
